spring:
  application:
    name: cachecompare

  datasource:
    url: jdbc:postgresql://localhost:5432/cachecompare
    username: cacheuser
    password: cachepass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

cache:
  strategy: lazy
  log:
    dir: logs

---
spring:
  config:
    activate:
      on-profile: redis
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5

---
spring:
  config:
    activate:
      on-profile: hazelcast

---
spring:
  config:
    activate:
      on-profile: inmemory
